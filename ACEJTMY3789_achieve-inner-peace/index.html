		<script>
			$(document).ready(function () {

			});
			
			countdown(10);
			
			var s1 = document.getElementById('s1');
			var s2 = document.getElementById('s2');
			
			function countdown(minutes) {
			  var seconds = 60;
			  var mins = minutes
			
			  function tick() {
			    var counter = document.getElementById("counter");
			    var current_minutes = mins - 1
			    seconds--;
			    counter.innerHTML = current_minutes.toString() + ":" + (seconds < 10 ? "0" : "") + String(seconds);
			    if (seconds > 0) {
			      setTimeout(tick, 1000);
			    } else {
			      if (mins > 1) {
			        countdown(mins - 1);
			      }
			    }
			  }
			  tick();
			}
			
			function startSpin() {
			
			  s1.play();
			
			  $(".spinner").addClass("spinfail");
			
			  setTimeout(function () {
			    s1.pause();
			    s1.currentTime = 0;
			    $("#spin_again_modal").modal("show");
			
			  }, 4400);
			
			}
			
			function startSpinWin() {
			  s1.play();
			  $(".spinner").removeClass("spinfail");
			
			  $("#spin_again_modal").modal("hide");
			
			  $(".spinner").addClass("spinWin");
			
			  setTimeout(function () {
			    s1.pause();
			
			    s2.play();
			    $("#winner_modal").modal("show");
			  }, 4400);
			}
			
			var value = 888888850;
			var count_up = 0;
			var countdownElement = document.getElementById("result");
			
			var countdownInterval = function () {
			  value++;
			  count_up++;
			  countdownElement.innerHTML = (value / 100).toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$&,');
			};
			
			var intervalID = window.setInterval(countdownInterval, 50);
